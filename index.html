<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="icon" type="image/x-icon" href="./assets/img/favicon.png" />
        <title>Kara</title>

        <script src="https://kit.fontawesome.com/afca0d2ab0.js" crossorigin="anonymous"></script>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" />
        <link rel="stylesheet" href="./assets/css/styles.css" />
    </head>
    <body>
        <!-- Header -->
        <header class="pt-4">
            <div class="container">
                <div class="row header-items">
                    <nav class="col-12 navbar navbar-expand-lg navbar-dark bg-transparent">
                        <div class="container-fluid">
                            <a class="navbar-brand" href="#">
                                <img src="./assets/img/logo.png" alt="Logo" />
                            </a>

                            <button
                                class="navbar-toggler"
                                type="button"
                                data-bs-toggle="collapse"
                                data-bs-target="#navbarItems"
                                aria-controls="navbarItems"
                                aria-expanded="false"
                                aria-label="Toggle navigation"
                            >
                                <span class="navbar-toggler-icon"></span>
                            </button>

                            <div class="collapse navbar-collapse" id="navbarItems">
                                <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                                    <li class="nav-item">
                                        <a class="nav-link" href="#">Services</a>
                                    </li>
                                    <li class="nav-item">
                                        <a class="nav-link" href="#">Works</a>
                                    </li>
                                    <li class="nav-item">

                                    <li class="nav-item">
                                        <a class="nav-link" href="#">Contact</a>
                                    </li>
                                </ul>

                                <ol class="social-mobile">
                                    <li class="me-3">
                                        <a href="#"><i class="fab fa-facebook-square fa-2x"></i></a>
                                    </li>
                                    <li class="me-3">
                                        <a href="#"><i class="fab fa-twitter-square fa-2x"></i></a>
                                    </li>
                                    <li class="me-3">
                                        <a href="#"><i class="fab fa-linkedin fa-2x"></i></a>
                                    </li>
                                </ol>
                            </div>
                        </div>
                    </nav>

                    <div class="col-12">
                        <h1 class="main-title text-white text-center">Digital Marketing</h1>
                        <p class="text-center"><span class="h3 d-inline-block text-white">Consultancy</span></p>
                    </div>

                    <div class="col-12 position-relative text-center">
                        <div class="scroll-img"></div>
                    </div>
                </div>
            </div>
        </header>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
        <script src="./assets/js/script.js"></script>

</html>
